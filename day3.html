<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military Barrack</title>
    <link rel="stylesheet" href="day3.css">
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="app" class="state-outside">
        <div id="fade-overlay"></div>

        <!-- Outside Scene -->
        <section id="scene-outside" class="scene active">
            <div class="sky"></div>
            <div class="fog"></div>
            <div class="ground"></div>

            <div class="hut-container" id="enter-hut">
                <div class="lamp-glow"></div>
                <div class="lamp"></div>
                <div class="hut">
                    <div class="hut-roof"></div>
                    <div class="hut-body">
                        <div class="hut-door"></div>
                        <div class="hut-label">BARRACK</div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Inside Scene -->
        <section id="scene-inside" class="scene">
            <div class="wall">
                <div class="arsenal-grid" id="arsenal-grid">
                    <!-- Items generated by JS -->
                </div>
            </div>
        </section>

        <!-- Detail Scene -->
        <section id="scene-detail" class="scene">
            <button id="back-btn" class="hidden">RETURN TO BARRACK</button>
            <div class="detail-container">
                <div class="detail-item" id="detail-item-view">
                </div>
                <div class="terminal">
                    <div class="terminal-header">SYSTEM DIAGNOSTIC // ARSENAL DATALINK</div>
                    <div class="terminal-content"><span id="terminal-text"></span><span class="cursor">&nbsp;</span>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <script type="module" src="day3.js"></script>
</body>

</html>
